apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 90
commanapi-prefix:
  - script: |
      kubectl port-forward -n $NAMESPACE svc/perses-api-prefix-test 18090:8080 &
      PF_PID=$!
      trap "kill $PF_PID 2>/dev/null" EXIT
      sleep 3
      RESULT=$(curl -sf http://localhost:18090/api/v1/datasources/${NAMESPACE}/e2e-api-prefix-datasource) || {
        echo "FAIL: Datasource e2e-api-prefix-datasource not found in Perses instance"
        exit 1
      }
      echo "$RESULT" | grep -q "E2E API Prefix Datasource" || {
        echo "FAIL: Datasource display name mismatch"
        exit 1
      }
      echo "Datasource e2e-api-prefix-datasource found in Perses instance"
