  description: |-
    The Perses Operator provides [Kubernetes](https://kubernetes.io/) native deployment and management of [Perses](https://github.com/perses/perses) and related resources. The purpose of this operator is to simplify and automate the deployment and management of Perses observability dashboards on Kubernetes clusters.

    ### Operator features

    * **Kubernetes Custom Resources**: Use Kubernetes custom resources to deploy and manage Perses instances, dashboards, and datasources.
    * **Dashboard-as-Code**: Declaratively manage dashboards and datasources as Kubernetes resources, with automatic synchronization to Perses instances.
    * **Flexible Storage**: Configure SQL database (Deployment) or file-based storage with PVC (StatefulSet) or emptyDir from a native Kubernetes resource.
    * **TLS and Authentication**: Configure server TLS, client mTLS, and datasource proxy TLS. Support for BasicAuth, OAuth, and native Kubernetes authentication.
    * **Multi-Instance Sync**: Use `instanceSelector` on dashboards and datasources to target specific Perses instances, with namespace-to-project mapping for isolation.
    * **Observability**: Built-in Prometheus metrics and alerting rules compatible with the [Prometheus Operator](https://github.com/prometheus-operator/prometheus-operator).

    ### Custom Resource Definitions

    The operator acts on the following Custom Resource Definitions (CRDs):

    * **`Perses`**, which defines a desired Perses server deployment. The operator manages the underlying Deployment or StatefulSet, Service, and ConfigMap based on the spec.
    * **`PersesDashboard`**, which declaratively specifies a dashboard to be synced to Perses instances. Kubernetes namespaces map to Perses projects.
    * **`PersesDatasource`**, which declaratively specifies a project-scoped datasource to be synced to matching Perses instances.
    * **`PersesGlobalDatasource`**, which declaratively specifies a cluster-scoped datasource shared across all Perses projects.

    ### Before you start

    1. Ensure Kubernetes 1.25+ is available in your cluster.
    2. Ensure [cert-manager](https://cert-manager.io/) is installed in the cluster. It is required for webhook TLS certificates.

    ### Getting Started

    After installing this operator via OperatorHub, create a `Perses` custom resource to deploy a Perses instance. Example manifests are available in the OperatorHub console (**alm-examples**) and in the [v1alpha2 samples](https://github.com/perses/perses-operator/tree/main/config/samples/v1alpha2) on GitHub.

    1. Create a namespace for your Perses resources:

        ```bash
        kubectl create namespace perses-dev
        ```

    2. Apply a sample `Perses` resource (adjust to your environment):

        ```bash
        kubectl apply -f https://raw.githubusercontent.com/perses/perses-operator/main/config/samples/v1alpha2/perses.yaml -n perses-dev
        ```

    3. Access the Perses UI:

        ```bash
        kubectl -n perses-dev port-forward svc/perses-sample 8080:8080
        ```

    For advanced configuration, see the [User Guide](https://perses.dev/perses-operator/docs/user-guide/) and [API Reference](https://perses.dev/perses-operator/docs/api/).

    ### Upgrading

    CRDs default to `perses.dev/v1alpha2`. The `v1alpha1` API version is deprecated and will be removed in a future release. Existing `v1alpha1` resources are automatically converted via the conversion webhook when cert-manager is enabled. Users should migrate their manifests to use `v1alpha2`. See the [User Guide](https://perses.dev/perses-operator/docs/user-guide/) for details.

    ### Project Status

    The operator is under active development. The `perses.dev/v1alpha2` API is **unstable** and may change frequently. We encourage usage for testing and development, but suggest caution in mission-critical environments.

    ### Documentation

    * [User Guide](https://perses.dev/perses-operator/docs/user-guide/)
    * [API Reference](https://perses.dev/perses-operator/docs/api/)
    * [Example Configurations](https://github.com/perses/perses-operator/tree/main/config/samples/v1alpha2)
  displayName: Perses Operator
  icon:
  - base64data: 
    mediatype: image/jpeg
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - apps
          resources:
          - deployments
          - statefulsets
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        - apiGroups:
          - ""
          resources:
          - services
          - secrets
          - configmaps
          verbs:
          - get
          - patch
          - update
          - create
          - delete
          - list
          - watch
        - apiGroups:
          - perses.dev
          resources:
          - perses
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - perses.dev
          resources:
          - perses/finalizers
          verbs:
          - update
        - apiGroups:
          - perses.dev
          resources:
          - perses/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - perses.dev
          resources:
          - persesdashboards
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - perses.dev
          resources:
          - persesdashboards/finalizers
          verbs:
          - update
        - apiGroups:
          - perses.dev
          resources:
          - persesdashboards/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - perses.dev
          resources:
          - persesdatasources
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - perses.dev
          resources:
          - persesdatasources/finalizers
          verbs:
          - update
        - apiGroups:
          - perses.dev
          resources:
          - persesdatasources/status
          verbs:
          - get
          - patch
          - update
        serviceAccountName: controller-manager
      deployments:
      - name: perses-operator
        spec:
          replicas: 1
          selector:
            matchLabels:
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                control-plane: controller-manager
            spec:
              affinity:
                nodeAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    nodeSelectorTerms:
                    - matchExpressions:
                      - key: kubernetes.io/arch
                        operator: In
                        values:
                        - amd64
                        - arm64
                      - key: kubernetes.io/os
                        operator: In
                        values:
                        - linux
              containers:
              - args:
                - --leader-elect
                image: docker.io/persesdev/perses-operator:v0.4.0
                imagePullPolicy: Always
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 128Mi
                  requests:
                    cpu: 10m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
              serviceAccountName: controller-manager
              terminationGracePeriodSeconds: 10
    strategy: deployment
  installModes:
  - supported: false
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - monitoring
  - logs
  - traces
  - metrics
  - dashboards
  links:
  - name: User Guide
    url: https://perses.dev/perses-operator/docs/user-guide/
  - name: API Reference
    url: https://perses.dev/perses-operator/docs/api/
  - name: Source Code
    url: https://github.com/perses/perses-operator
  - name: Perses Project
    url: https://perses.dev
  maintainers:
  - email: gbernal@redhat.com
    name: Gabriel Bernal
  - email: augustin.husson@amadeus.com
    name: Augustin Husson
  - email: janantha@redhat.com
    name: Jayapriya Pai
  maturity: alpha
  minKubeVersion: 1.25.0
  provider:
    name: Perses
    url: perses.dev
  replaces: <OLD_BUNDLE_VERSION>
  version: 0.1.0
