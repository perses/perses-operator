apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "perses.dev/v1alpha1",
          "kind": "Perses",
          "metadata": {
            "name": "perses-sample",
            "namespace": "perses-dev"
          },
          "spec": {
            "config": {
              "database": {
                "file": {
                  "folder": "/etc/perses/storage",
                  "extension": "yaml"
                }
              }
            },
            "containerPort": 8080
          }
        },
        {
          "apiVersion": "perses.dev/v1alpha1",
          "kind": "PersesDashboard",
          "metadata": {
            "name": "perses-dashboard-sample",
            "namespace": "perses-dev"
          },
          "spec": {
            "display": {
              "name": "Sample Dashboard"
            },
            "duration": "5m",
            "panels": {
              "sample": {
                "kind": "Panel",
                "spec": {
                  "display": {
                    "name": "Up"
                  },
                  "plugin": {
                    "kind": "TimeSeriesChart",
                    "spec": {}
                  },
                  "queries": [
                    {
                      "kind": "TimeSeriesQuery",
                      "spec": {
                        "plugin": {
                          "kind": "PrometheusTimeSeriesQuery",
                          "spec": {
                            "query": "up"
                          }
                        }
                      }
                    }
                  ]
                }
              }
            },
            "layouts": [
              {
                "kind": "Grid",
                "spec": {
                  "display": {
                    "title": "Row 1"
                  },
                  "items": [
                    {
                      "x": 0,
                      "y": 0,
                      "width": 24,
                      "height": 6,
                      "content": {
                        "$ref": "#/spec/panels/sample"
                      }
                    }
                  ]
                }
              }
            ]
          }
        },
        {
          "apiVersion": "perses.dev/v1alpha1",
          "kind": "PersesDatasource",
          "metadata": {
            "name": "perses-datasource-sample",
            "namespace": "perses-dev"
          },
          "spec": {
            "display": {
              "name": "Default Datasource"
            },
            "default": true,
            "plugin": {
              "kind": "PrometheusDatasource",
              "spec": {
                "directUrl": "https://prometheus.demo.do.prometheus.io"
              }
            }
          }
        }
      ]
    capabilities: Basic Install
    categories: Monitoring
    containerImage: docker.io/persesdev/perses-operator:v0.1.0
    repository: https://github.com/perses/perses-operator
  labels:
    operatorframework.io/arch.amd64: supported
    operatorframework.io/arch.arm64: supported
  name: perses-operator.v0.1.0
  namespace: operators
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: A Perses Dashboard
      displayName: Perses Dashboard
      kind: PersesDashboard
      name: persesdashboards.perses.dev
      specDescriptors:
      - displayName: Spec
        path: spec
      statusDescriptors:
      - displayName: Conditions
        path: conditions
      version: v1alpha1
    - description: A Perses Dashboard
      displayName: Perses Dashboard
      kind: PersesDashboard
      name: persesdashboards.perses.dev
      specDescriptors:
      - displayName: Config
        path: config
      - displayName: Instance Selector
        path: instanceSelector
      statusDescriptors:
      - displayName: Conditions
        path: conditions
      version: v1alpha2
    - description: A Perses Datasource
      displayName: Perses Datasource
      kind: PersesDatasource
      name: persesdatasources.perses.dev
      specDescriptors:
      - displayName: Spec
        path: spec
      statusDescriptors:
      - displayName: Conditions
        path: conditions
      version: v1alpha1
    - description: A Perses Datasource
      displayName: Perses Datasource
      kind: PersesDatasource
      name: persesdatasources.perses.dev
      specDescriptors:
      - displayName: Config
        path: config
      - displayName: Client
        path: client
      - displayName: Instance Selector
        path: instanceSelector
      statusDescriptors:
      - displayName: Conditions
        path: conditions
      version: v1alpha2
    - description: A Perses Global Datasource
      displayName: Perses Global Datasource
      kind: PersesGlobalDatasource
      name: persesglobaldatasources.perses.dev
      specDescriptors:
      - displayName: Config
        path: config
      - displayName: Client
        path: client
      - displayName: Instance Selector
        path: instanceSelector
      statusDescriptors:
      - displayName: Conditions
        path: conditions
      version: v1alpha2
    - description: Perses is the Schema for the perses API
      displayName: Perses
      kind: Perses
      name: perses.perses.dev
      specDescriptors:
      - description: metadata specifies additional metadata to add to deployed pods
        displayName: Metadata
        path: metadata
      - description: client specifies the Perses client configuration
        displayName: Client
        path: client
      - description: config specifies the Perses server configuration
        displayName: Config
        path: config
      - description: args are extra command-line arguments to pass to the Perses server
        displayName: Args
        path: args
      - description: containerPort is the port on which the Perses server listens
          for HTTP requests
        displayName: Container Port
        path: containerPort
      - description: replicas is the number of desired pod replicas for the Perses
          deployment
        displayName: Replicas
        path: replicas
      - description: resources defines the compute resources configured for the container
        displayName: Resources
        path: resources
      - description: nodeSelector constrains pods to nodes with matching labels
        displayName: Node Selector
        path: nodeSelector
      - description: tolerations allow pods to schedule onto nodes with matching taints
        displayName: Tolerations
        path: tolerations
      - description: affinity specifies the pod's scheduling constraints
        displayName: Affinity
        path: affinity
      - description: image specifies the container image that should be used for the
          Perses deployment
        displayName: Image
        path: image
      - description: service specifies the service configuration for the Perses instance
        displayName: Service
        path: service
      - displayName: Name
        path: service.name
      - displayName: Annotations
        path: service.annotations
      - description: livenessProbe specifies the liveness probe configuration for
          the Perses container
        displayName: Liveness Probe
        path: livenessProbe
      - description: readinessProbe specifies the readiness probe configuration for
          the Perses container
        displayName: Readiness Probe
        path: readinessProbe
      - description: tls specifies the TLS configuration for the Perses instance
        displayName: TLS
        path: tls
      - description: storage configuration used by the StatefulSet
        displayName: Storage
        path: storage
      - description: serviceAccountName is the name of the ServiceAccount to use for
          the Perses deployment or statefulset
        displayName: Service Account Name
        path: serviceAccountName
      statusDescriptors:
      - displayName: Conditions
        path: conditions
      - displayName: Provisioning
        path: provisioning
      version: v1alpha2
    - description: Perses is the Schema for the perses API
      displayName: Perses
      kind: Perses
      name: perses.perses.dev
      specDescriptors:
      - displayName: Affinity
        path: affinity
      - description: Args extra arguments to pass to perses
        displayName: Args
        path: args
      - description: Perses client configuration
        displayName: Client
        path: client
      - displayName: Config
        path: config
      - displayName: Container Port
        path: containerPort
      - description: Image specifies the container image that should be used for the
          Perses deployment.
        displayName: Image
        path: image
      - displayName: Liveness Probe
        path: livenessProbe
      - displayName: Metadata
        path: metadata
      - displayName: Node Selector
        path: nodeSelector
      - displayName: Readiness Probe
        path: readinessProbe
      - displayName: Replicas
        path: replicas
      - description: service specifies the service configuration for the perses instance
        displayName: Service
        path: service
      - displayName: Annotations
        path: service.annotations
      - displayName: Name
        path: service.name
      - description: ServiceAccountName is the name of the service account to use
          for the perses deployment or statefulset.
        displayName: Service Account Name
        path: serviceAccountName
      - description: Storage configuration used by the StatefulSet
        displayName: Storage
        path: storage
      - description: tls specifies the tls configuration for the perses instance
        displayName: TLS
        path: tls
      - displayName: Tolerations
        path: tolerations
      statusDescriptors:
      - displayName: Conditions
        path: conditions
      version: v1alpha1
  description: The Perses Operator deploys and manages Perses instances, dashboards
    and datasources.
  displayName: Perses Operator
  icon:
  - base64data: 
    mediatype: image/jpeg
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - apps
          resources:
          - deployments
          - statefulsets
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        - apiGroups:
          - ""
          resources:
          - services
          - secrets
          - configmaps
          verbs:
          - get
          - patch
          - update
          - create
          - delete
          - list
          - watch
        - apiGroups:
          - perses.dev
          resources:
          - perses
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - perses.dev
          resources:
          - perses/finalizers
          verbs:
          - update
        - apiGroups:
          - perses.dev
          resources:
          - perses/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - perses.dev
          resources:
          - persesdashboards
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - perses.dev
          resources:
          - persesdashboards/finalizers
          verbs:
          - update
        - apiGroups:
          - perses.dev
          resources:
          - persesdashboards/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - perses.dev
          resources:
          - persesdatasources
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - perses.dev
          resources:
          - persesdatasources/finalizers
          verbs:
          - update
        - apiGroups:
          - perses.dev
          resources:
          - persesdatasources/status
          verbs:
          - get
          - patch
          - update
        serviceAccountName: controller-manager
      deployments:
      - name: perses-operator
        spec:
          replicas: 1
          selector:
            matchLabels:
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                control-plane: controller-manager
            spec:
              affinity:
                nodeAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    nodeSelectorTerms:
                    - matchExpressions:
                      - key: kubernetes.io/arch
                        operator: In
                        values:
                        - amd64
                        - arm64
                      - key: kubernetes.io/os
                        operator: In
                        values:
                        - linux
              containers:
              - args:
                - --leader-elect
                image: docker.io/persesdev/perses-operator:v0.1.0
                imagePullPolicy: Always
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 128Mi
                  requests:
                    cpu: 10m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
              serviceAccountName: controller-manager
              terminationGracePeriodSeconds: 10
    strategy: deployment
  installModes:
  - supported: false
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - monitoring
  - logs
  - traces
  - metrics
  - dashboards
  links:
  - name: Perses Operator
    url: https://perses.dev
  maintainers:
  - email: gbernal@redhat.com
    name: Gabriel Bernal
  - email: augustin.husson@amadeus.com
    name: Augustin Husson
  maturity: alpha
  minKubeVersion: 1.25.0
  provider:
    name: Perses
    url: perses.dev
  replaces: <OLD_BUNDLE_VERSION>
  version: 0.1.0
