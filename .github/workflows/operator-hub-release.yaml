name: Create OperatorHub pull request

on:
  workflow_call:
    inputs:
      org:
        type: string
        required: true
      repo:
        type: string
        required: true
      release_ref:
        type: string
        required: true
      version_replaced:
        description: Previous operator version on OperatorHub (for example 0.1.1). Empty = auto-detect from upstream catalog.
        type: string
        required: false
        default: ""
    secrets:
      BOT_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      org:
        description: Organization that owns the target repository
        required: true
        type: string
        default: k8s-operatorhub
      repo:
        description: Target repository name
        required: true
        type: string
        default: community-operators
      release_ref:
        description: Release tag to publish from (for example v0.4.0)
        required: true
        type: string
      version_replaced:
        description: Previous version on OperatorHub (for example 0.1.1). Leave empty to use the latest version already in the catalog.
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  BOT_USER: persesbot
  OPERATOR_NAME: perses-operator

jobs:
  create-operator-pull-request:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Validate and prepare release values
        id: prepare_release
        env:
          RELEASE_REF_INPUT: ${{ inputs.release_ref }}
        run: |
          # Trim leading/trailing whitespace; empty input stays empty (no false non-empty TAG).
          RELEASE_REF_INPUT="${RELEASE_REF_INPUT#"${RELEASE_REF_INPUT%%[![:space:]]*}"}"
          RELEASE_REF_INPUT="${RELEASE_REF_INPUT%"${RELEASE_REF_INPUT##*[![:space:]]}"}"

          if [ -z "${RELEASE_REF_INPUT}" ]; then
            echo "A release tag is required. Pass release_ref (for example v0.4.0)." >&2
            exit 1
          fi

          TAG="${RELEASE_REF_INPUT#refs/tags/}"
          VERSION="${TAG#v}"

          # Trimmed non-empty input can still yield an empty tag (e.g. value is exactly refs/tags/).
          if [ -z "${TAG}" ]; then
            echo "release_ref resolved to an empty tag after normalizing refs/tags/ prefix." >&2
            exit 1
          fi

          remote_url="https://github.com/${GITHUB_REPOSITORY}.git"
          if ! ls_remote_err=$(git ls-remote --exit-code --tags "${remote_url}" "refs/tags/${TAG}" 2>&1); then
            echo "Could not confirm tag refs/tags/${TAG} in ${GITHUB_REPOSITORY}." >&2
            echo "The tag may be missing, or git could not reach the repository (network, DNS, or transient error)." >&2
            echo "git ls-remote: ${ls_remote_err}" >&2
            exit 1
          fi

          echo "release_ref=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync fork
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          gh repo sync ${{ env.BOT_USER }}/${{ inputs.repo }} \
              --source ${{ inputs.org }}/${{ inputs.repo }} \
              --force

      - name: Checkout community-operators fork
        uses: actions/checkout@v7
        with:
          repository: ${{ env.BOT_USER }}/${{ inputs.repo }}
          token: ${{ secrets.BOT_TOKEN }}

      - name: Determine previous OperatorHub version
        id: operatorhub_prev
        env:
          VERSION: ${{ steps.prepare_release.outputs.version }}
          VERSION_REPLACED_INPUT: ${{ inputs.version_replaced }}
        run: |
          if [ -n "${VERSION_REPLACED_INPUT}" ]; then
            echo "version_replaced=${VERSION_REPLACED_INPUT}" >> "$GITHUB_OUTPUT"
            echo "Using explicit version_replaced=${VERSION_REPLACED_INPUT}"
            exit 0
          fi

          operator_dir="operators/${OPERATOR_NAME}"
          if [ ! -d "${operator_dir}" ]; then
            echo "::error::${operator_dir} not found on fork after sync; cannot determine version_replaced." >&2
            echo "Set workflow input version_replaced to the last version on OperatorHub (for example 0.1.1)." >&2
            exit 1
          fi

          prev="$(
            find "${operator_dir}" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' |
              grep -v "^${VERSION}$" |
              sort -V |
              tail -1
          )"

          if [ -z "${prev}" ]; then
            echo "::error::No prior ${OPERATOR_NAME} version in catalog to replace." >&2
            echo "Set workflow input version_replaced if this is not the first OperatorHub release." >&2
            exit 1
          fi

          echo "version_replaced=${prev}" >> "$GITHUB_OUTPUT"
          echo "Auto-detected version_replaced=${prev} (latest on OperatorHub before ${VERSION})"

      - name: Checkout perses-operator at release tag
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository }}
          ref: ${{ steps.prepare_release.outputs.release_ref }}
          path: tmp/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tmp/go.mod

      - name: Generate bundle manifests
        working-directory: tmp/
        env:
          VERSION: ${{ steps.prepare_release.outputs.version }}
          VERSION_REPLACED: ${{ steps.operatorhub_prev.outputs.version_replaced }}
          IMG: docker.io/persesdev/perses-operator:v${{ steps.prepare_release.outputs.version }}
        run: make bundle

      - name: Align containerImage annotation with release image
        working-directory: tmp/
        env:
          IMG: docker.io/persesdev/perses-operator:v${{ steps.prepare_release.outputs.version }}
        run: |
          csv="bundle/manifests/perses-operator.clusterserviceversion.yaml"
          if ! grep -q 'containerImage:' "$csv"; then
            echo "containerImage annotation not found in ${csv}" >&2
            exit 1
          fi
          sed -i "s|^[[:space:]]*containerImage:.*|    containerImage: ${IMG}|" "$csv"

      - name: Copy bundle to versioned directory
        env:
          VERSION: ${{ steps.prepare_release.outputs.version }}
        run: |
          mkdir -p operators/${OPERATOR_NAME}/${VERSION}
          cp -R tmp/bundle/manifests operators/${OPERATOR_NAME}/${VERSION}/
          cp -R tmp/bundle/metadata operators/${OPERATOR_NAME}/${VERSION}/
          cp -R tmp/bundle/tests operators/${OPERATOR_NAME}/${VERSION}/
          rm -rf tmp/

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
          VERSION: ${{ steps.prepare_release.outputs.version }}
        run: |
          git config user.name ${{ env.BOT_USER }}
          git config user.email ${{ env.BOT_USER }}@users.noreply.github.com

          message="operator ${OPERATOR_NAME} (${VERSION})"
          branch="update-${OPERATOR_NAME}-to-${VERSION}"
          head_branch="${{ env.BOT_USER }}:${branch}"
          target_repo="${{ inputs.org }}/${{ inputs.repo }}"

          git checkout -B "${branch}"
          git add -A
          if git diff --cached --quiet; then
            echo "No operator bundle changes to commit."
          else
            git commit -s -m "${message}"
          fi
          git push -f --set-upstream origin "${branch}"

          existing_pr="$(
            gh pr list \
              --repo "${target_repo}" \
              --head "${head_branch}" \
              --base main \
              --state open \
              --json url \
              --jq '.[0].url // empty'
          )"

          if [ -n "${existing_pr}" ]; then
            echo "Open pull request already exists; updated branch ${head_branch}."
            echo "${existing_pr}"
            exit 0
          fi

          gh pr create \
            --title "${message}" \
            --body "Release ${OPERATOR_NAME} \`${VERSION}\`." \
            --head "${head_branch}" \
            --repo "${target_repo}" \
            --base main
