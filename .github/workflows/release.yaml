name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "New version to release, e.g. 0.4.0 (no 'v' prefix)"
        required: true
        type: string
      version-replace:
        description: "Previously shipped version for the OLM replaces chain, e.g. 0.3.2"
        required: true
        type: string

permissions:
  contents: read

env:
  BOT_USER: persesbot

jobs:
  prepare-release:
    permissions:
      contents: write
      pull-requests: write
    name: Prepare release PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-preparation
      cancel-in-progress: true
    steps:
      - name: Validate inputs
        env:
          TAG: ${{ inputs.tag }}
          VERSION_REPLACE: ${{ inputs.version-replace }}
        run: |
          SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+$'
          [[ "$TAG" =~ $SEMVER_REGEX ]] || {
            echo "::error title=Invalid input::tag='$TAG' must be MAJOR.MINOR.PATCH (e.g. 0.4.0, no 'v' prefix)"
            exit 1
          }
          [[ "$VERSION_REPLACE" =~ $SEMVER_REGEX ]] || {
            echo "::error title=Invalid input::version-replace='$VERSION_REPLACE' must be MAJOR.MINOR.PATCH (e.g. 0.3.2)"
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # NOTE: we need to fetch the whole history to be able to generate the changelog
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install tools
        uses: ./.github/tools-cache

      - name: Update VERSION
        run: echo "${{ inputs.tag }}" > VERSION

      - name: Generate changelog
        run: make generate-changelog

      - name: Generate bundle
        env:
          VERSION_REPLACED: ${{ inputs.version-replace }}
        run: make bundle

      - name: Generate installer manifest
        run: make build-installer

      - name: Create or update pull request
        # NOTE: BOT_TOKEN (PAT for persesbot) is required: a PR opened with the default
        # GITHUB_TOKEN would not trigger downstream pull_request workflows.
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
          TAG: ${{ inputs.tag }}
          VERSION_REPLACED: ${{ inputs.version-replace }}
        run: |
          git config user.name "${{ env.BOT_USER }}"
          git config user.email "${{ env.BOT_USER }}@users.noreply.github.com"

          branch="chore-version-${TAG}"
          message="chore: update VERSION to ${TAG}"
          head_ref="${branch}"
          target_repo="${{ github.repository }}"

          gh auth setup-git

          git checkout -B "${branch}"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit for the release preparation."
          else
            git commit -s -m "${message}"
          fi
          git push -f --set-upstream origin "${branch}"

          existing_pr="$(
            gh pr list \
              --repo "${target_repo}" \
              --head "${head_ref}" \
              --base main \
              --state open \
              --json url \
              --jq '.[0].url // empty'
          )"

          if [ -n "${existing_pr}" ]; then
            echo "Open pull request already exists; updated branch ${branch}."
            echo "${existing_pr}"
            exit 0
          fi

          BODY=$(printf '%s\n' \
            "Automated release PR for \`v${TAG}\`" \
            "- \`VERSION\` bumped to \`${TAG}\`" \
            "- Changelog generated (\`CHANGELOG.md\`) and ready for \`UNKNOWN\` cleanup in PR review" \
            "- Bundle generated with \`VERSION_REPLACED=${VERSION_REPLACED}\` (OLM \`replaces: perses-operator.v${VERSION_REPLACED}\`)" \
            "- Installer manifest \`bundle.yaml\` generated")

          gh pr create \
            --title "${message}" \
            --body "$BODY" \
            --head "${head_ref}" \
            --repo "${target_repo}" \
            --base main
